---
driver:
  name: docker

platforms:
  - name: instance-rhel10
    image: registry.access.redhat.com/ubi10/ubi-init:latest
    command: "/usr/sbin/init"
    pre_build_image: true
    privileged: true
    port_bindings:
      - ${PORT_BINDING:-8080}:8080
    published_ports:
      - 0.0.0.0:${PORT_BINDING:-8080}:8080/TCP

  - name: instance-rhel9
    image: registry.access.redhat.com/ubi9/ubi-init:latest
    command: "/usr/sbin/init"
    pre_build_image: true
    privileged: true
    port_bindings:
      - ${PORT_BINDING:-8081}:8080

provisioner:
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
  env:
    ANSIBLE_FORCE_COLOR: "true"
verifier:
  name: ansible
scenario:
  test_sequence:
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
