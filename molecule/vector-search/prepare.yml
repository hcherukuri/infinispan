---
- name: Prepare
  hosts: all
  vars:
    sudo_pkg_name: 'sudo'
    vector_search_test_jar: "{{ playbook_dir }}/test-app/target/vector-search-test-1.0.0.jar"
  tasks:

    - name: "Ensure {{ sudo_pkg_name }} is installed (if user is root)."
      ansible.builtin.yum:
        name: "{{ sudo_pkg_name }}"
      when:
        - ansible_user_id == 'root'

    - name: "Gather the package facts"
      ansible.builtin.package_facts:
        manager: auto

    - name: "Check if {{ sudo_pkg_name }} is installed"
      ansible.builtin.assert:
        that:
          - sudo_pkg_name in ansible_facts.packages

    - name: "Install requirements for tests"
      become: true
      ansible.builtin.yum:
        name:
          - iproute
          - python3-lxml
        state: present

    - name: "Retrieve assets server from env"
      ansible.builtin.set_fact:
        assets_server: "{{ lookup('env','MIDDLEWARE_DOWNLOAD_RELEASE_SERVER_URL') }}"

    - name: "Download and deploy jdg zips from {{ assets_server }}"
      ansible.builtin.get_url:
        url: "{{ asset }}"
        dest: "{{ lookup('env', 'PWD') }}"
        validate_certs: no
      delegate_to: localhost
      loop:
         - "{{ assets_server }}/datagrid/8.4.0/redhat-datagrid-8.4.0-server.zip"
      loop_control:
        loop_var: asset
      when:
        - assets_server is defined
        - assets_server | length > 0

    - name: "Install Java 25"
      become: true
      ansible.builtin.package:
        name: java-25-openjdk-headless
        state: present

    - name: Install Java 25 on controller for Maven build
      ansible.builtin.shell: |
        set -euo pipefail
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y openjdk-25-jdk-headless
        elif command -v dnf >/dev/null 2>&1; then
          dnf install -y java-25-openjdk-devel
        else
          echo "No supported package manager on controller for Java 25" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      delegate_to: localhost
      become: true
      run_once: true
      changed_when: true

    - name: Build vector-search test JAR on controller
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -d /usr/lib/jvm/java-25-openjdk-amd64 ]; then
          export JAVA_HOME=/usr/lib/jvm/java-25-openjdk-amd64
        elif [ -d /usr/lib/jvm/java-25-openjdk ]; then
          export JAVA_HOME=/usr/lib/jvm/java-25-openjdk
        else
          export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")"
        fi
        cd "{{ playbook_dir }}/test-app"
        mvn -q package -DskipTests
      args:
        creates: "{{ vector_search_test_jar }}"
        executable: /bin/bash
      delegate_to: localhost
      run_once: true

    - name: Copy vector-search-test.jar to /tmp
      ansible.builtin.copy:
        src: "{{ vector_search_test_jar }}"
        dest: /tmp/vector-search-test.jar
        mode: '0644'
